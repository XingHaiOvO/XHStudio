<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>重置密码 - 验证码</title>
</head>
<body style="margin:0;padding:0;background-color:#FFF5F5;font-family:'PingFang SC','Hiragino Sans GB','Noto Sans SC','Microsoft YaHei',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;font-size:16px;line-height:1.7;color:#4A3548;-webkit-text-size-adjust:100%;">

<!-- 外层 -->
<table role="presentation" style="width:100%;background-color:#FFF5F5;border:0;border-collapse:collapse;">
    <tr>
        <td style="padding:16px 12px 20px;text-align:center;">

            <!-- 主卡片 -->
            <table role="presentation" style="width:540px;max-width:100%;background-color:#FFFFFF;border-radius:12px;border:0;border-collapse:collapse;margin:0 auto;">

                <!-- Header -->
                <tr>
                    <td style="background-color:#FF9AA2;background:linear-gradient(160deg,#FF9AA2,#FFB7B2,#FFC8B8);padding:28px 20px 24px;border-radius:12px 12px 0 0;text-align:center;">

                        <!-- 星形图标 -->
                        <table role="presentation" style="margin:0 auto 10px;">
                            <tr>
                                <td style="width:44px;height:44px;background-color:rgba(255,255,255,0.20);border-radius:50%;text-align:center;vertical-align:middle;padding:0;">
                                    <span style="font-size:22px;color:#FFFFFF;line-height:44px;">&#9733;</span>
                                </td>
                            </tr>
                        </table>

                        <p style="font-size:22px;font-weight:700;color:#FFFFFF;letter-spacing:2px;margin:12px 0 0;">重 置 密 码</p>
                        <p style="font-size:12px;color:#FFFFFF;margin:4px 0 0;letter-spacing:1px;opacity:0.85;">已收到你的请求，请查收验证码</p>
                    </td>
                </tr>

                <!-- 过渡色条 -->
                <tr>
                    <td style="height:4px;background-color:#FFB7B2;font-size:0;line-height:0;padding:0;">&nbsp;</td>
                </tr>
                <tr>
                    <td style="height:4px;background-color:#FFDAC1;font-size:0;line-height:0;padding:0;">&nbsp;</td>
                </tr>
                <tr>
                    <td style="height:4px;background-color:#FFF0E8;font-size:0;line-height:0;padding:0;">&nbsp;</td>
                </tr>

                <!-- 内容区 -->
                <tr>
                    <td style="padding:24px 22px 18px;">

                        <p style="font-size:16px;font-weight:600;color:#4A3548;margin:0 0 6px;">
                            亲爱的<span th:text="${username}" style="color:#E8788A;font-weight:700;">用户</span>，你好
                        </p>

                        <p style="font-size:14px;color:#6E5C68;line-height:1.8;margin:0 0 20px;">
                            你提交了重置密码的申请。<br>请输入下方验证码完成验证：
                        </p>

                        <!-- 验证码区域 -->
                        <table role="presentation" style="width:100%;background-color:#FFF5F7;border:2px solid #FDDDDD;border-radius:10px;border-collapse:separate;">
                            <tr>
                                <td style="padding:20px 14px 16px;text-align:center;">

                                    <p style="font-size:12px;color:#D4A0A8;letter-spacing:3px;margin:0 0 10px;">验 证 码</p>

                                    <!-- 验证码数字块 -->
                                    <table role="presentation" style="background-color:#FFFFFF;border:2px solid #FFE0E0;border-radius:8px;border-collapse:separate;margin:0 auto;">
                                        <tr>
                                            <td style="padding:8px 18px 8px 24px;">
                                                <span th:text="${captcha}" style="font-family:'SF Mono','Cascadia Code','Consolas','Menlo','Courier New',monospace;font-size:30px;font-weight:800;letter-spacing:9px;color:#E8788A;">123456</span>
                                            </td>
                                        </tr>
                                    </table>

                                    <p style="font-size:13px;color:#CCA0A8;margin-top:10px;">
                                        有效期限
                                        <span th:text="${expireMinutes}" style="display:inline-block;background-color:#FFEBEE;color:#E8788A;font-weight:700;padding:2px 10px;border-radius:20px;margin:0 2px;">5</span>
                                        分钟，请尽快完成验证
                                    </p>

                                </td>
                            </tr>
                        </table>

                        <!-- 安全提示 -->
                        <table role="presentation" style="width:100%;background-color:#FFFCFC;border:2px dashed #F8D8DC;border-radius:8px;border-collapse:separate;margin-top:16px;">
                            <tr>
                                <td style="padding:14px 16px;text-align:center;">
                                    <p style="margin:0;font-size:13px;color:#8B7280;line-height:1.8;">
                                        如果不是你本人操作，请忽略此邮件。<br>你的账号安全不会受到影响。
                                    </p>
                                </td>
                            </tr>
                        </table>

                        <!-- 签名 -->
                        <p style="margin:22px 0 0;font-size:13px;color:#8B7280;line-height:1.9;text-align:center;">
                            感谢你的使用<br>
                            <span th:text="${studioName}" style="color:#E8788A;font-weight:700;font-size:14px;">XX 团队</span>
                        </p>

                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="background-color:#FFFBFC;padding:10px 20px;font-size:11px;color:#D0B0B8;border-top:1px solid #FFF0F0;line-height:1.8;border-radius:0 0 12px 12px;text-align:center;">
                        &copy; <span th:text="${currentYear} ?: ${#dates.year(#dates.createNow())}">2026</span> <span th:text="${studioName}"></span>
                        &nbsp;&nbsp;|&nbsp;&nbsp;
                        系统自动发送，请勿直接回复
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
