<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>重置密码 - 验证码</title>
</head>
<body style="margin:0;padding:0;background-color:#FFF5F5;font-family:'PingFang SC','Hiragino Sans GB','Noto Sans SC','Microsoft YaHei',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;font-size:16px;line-height:1.7;color:#4A3548;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">

<!-- ═══════════════ 外层容器 ═══════════════ -->
<table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation" bgcolor="#FFF5F5">
    <tr>
        <td align="center" style="padding:16px 12px 20px;">

            <!-- ═══ 主卡片 ═══ -->
            <table width="540" cellpadding="0" cellspacing="0" border="0" role="presentation" bgcolor="#FFFFFF" style="max-width:540px;border-radius:12px;">

                <!-- ──────── Header ──────── -->
                <tr>
                    <td align="center" bgcolor="#FF9AA2" style="background-color:#FF9AA2;padding:28px 20px 24px;border-radius:12px 12px 0 0;">

                        <!-- 图标圆 -->
                        <table cellpadding="0" cellspacing="0" border="0" role="presentation">
                            <tr>
                                <td width="44" height="44" align="center" bgcolor="rgba(255,255,255,0.20)" style="background-color:rgba(255,255,255,0.20);border-radius:50%;">
                                    <span style="font-size:20px;color:#FFFFFF;line-height:44px;font-weight:400;">&#9670;</span>
                                </td>
                            </tr>
                        </table>

                        <!-- 标题 -->
                        <p style="font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;font-size:22px;font-weight:700;color:#FFFFFF;letter-spacing:2px;margin:12px 0 0;">重 置 密 码</p>

                        <!-- 副标题 -->
                        <p style="font-size:12px;color:#FFFFFF;margin:4px 0 0;letter-spacing:1px;opacity:0.85;">已收到你的请求，请查收验证码</p>

                    </td>
                </tr>

                <!-- ── 过渡色条 ── -->
                <tr>
                    <td height="4" bgcolor="#FFB7B2" style="background-color:#FFB7B2;font-size:0;line-height:0;">&nbsp;</td>
                </tr>
                <tr>
                    <td height="4" bgcolor="#FFDAC1" style="background-color:#FFDAC1;font-size:0;line-height:0;">&nbsp;</td>
                </tr>
                <tr>
                    <td height="4" bgcolor="#FFF0E8" style="background-color:#FFF0E8;font-size:0;line-height:0;">&nbsp;</td>
                </tr>

                <!-- ──────── 内容区 ──────── -->
                <tr>
                    <td style="padding:24px 22px 18px;">

                        <!-- 问候 -->
                        <p style="font-size:16px;font-weight:600;color:#4A3548;margin:0 0 6px;">
                            <span th:text="${username}" style="color:#E8788A;font-weight:700;">用户</span>，你好
                        </p>

                        <!-- 正文 -->
                        <p style="font-size:14px;color:#6E5C68;line-height:1.8;margin:0 0 20px;">
                            你提交了重置密码的申请。<br>请在下方输入验证码完成验证：
                        </p>

                        <!-- ═══ 验证码区域 ═══ -->
                        <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation" bgcolor="#FFF5F7" style="background-color:#FFF5F7;border:2px solid #FDDDDD;border-radius:10px;">
                            <tr>
                                <td align="center" style="padding:20px 14px 16px;">

                                    <!-- 标签 -->
                                    <p style="font-size:12px;color:#D4A0A8;letter-spacing:3px;margin:0 0 10px;">验 证 码</p>

                                    <!-- 验证码 -->
                                    <table cellpadding="0" cellspacing="0" border="0" role="presentation" bgcolor="#FFFFFF" style="background-color:#FFFFFF;border:2px solid #FFE0E0;border-radius:8px;margin:0 auto;">
                                        <tr>
                                            <td style="padding:8px 18px 8px 24px;">
                                                <span th:text="${captcha}" style="font-family:'SF Mono','Cascadia Code','Consolas','Menlo','Courier New',monospace;font-size:30px;font-weight:800;letter-spacing:9px;color:#E8788A;">123456</span>
                                            </td>
                                        </tr>
                                    </table>

                                    <!-- 有效期 -->
                                    <p style="font-size:13px;color:#CCA0A8;margin-top:10px;">
                                        有效期限
                                        <span th:text="${expireMinutes}" style="display:inline-block;background-color:#FFEBEE;color:#E8788A;font-weight:700;padding:2px 10px;border-radius:20px;margin:0 2px;">5</span>
                                        分钟，请尽快完成验证
                                    </p>

                                </td>
                            </tr>
                        </table>

                        <!-- ═══ 安全提示 ═══ -->
                        <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation" bgcolor="#FFFCFC" style="background-color:#FFFCFC;border:2px dashed #F8D8DC;border-radius:8px;margin:16px 0 6px;">
                            <tr>
                                <td align="center" style="padding:14px 16px;">
                                    <p style="margin:0;font-size:13px;color:#8B7280;line-height:1.8;">
                                        如果不是你本人操作，请忽略此邮件。<br>你的账号安全不会受到影响。
                                    </p>
                                </td>
                            </tr>
                        </table>

                        <!-- 签名 -->
                        <p style="margin:22px 0 0;font-size:13px;color:#8B7280;line-height:1.9;text-align:center;">
                            感谢你的使用<br>
                            <span th:text="${studioName}" style="color:#E8788A;font-weight:700;font-size:14px;">XX 团队</span>
                        </p>

                    </td>
                </tr>

                <!-- ──────── Footer ──────── -->
                <tr>
                    <td align="center" bgcolor="#FFFBFC" style="background-color:#FFFBFC;padding:10px 20px;font-size:11px;color:#D0B0B8;border-top:1px solid #FFF0F0;line-height:1.8;border-radius:0 0 12px 12px;">
                        &copy; <span th:text="${currentYear}">2026</span> <span th:text="${studioName}"></span>
                        &nbsp;&nbsp;|&nbsp;&nbsp;
                        系统自动发送，请勿直接回复
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
