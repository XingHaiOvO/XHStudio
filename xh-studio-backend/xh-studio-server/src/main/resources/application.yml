server:
  port: 8080

spring:
  profiles:
    active: dev
  datasource:
    driver-class-name: ${xh.datasource.driver-class-name}
    url: jdbc:mysql://${xh.datasource.host}:${xh.datasource.port}/${xh.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${xh.datasource.username}
    password: ${xh.datasource.password}
  data:
    redis:
      host: ${xh.data.redis.host}
      port: ${xh.data.redis.port}
      password: ${xh.data.redis.password}
      database: ${xh.data.redis.database}
  mail:
    host: ${xh.mail.host}
    port: ${xh.mail.port}
    username: ${xh.mail.username}
    password: ${xh.mail.password}
    protocol: ${xh.mail.protocol}
    default-encoding: ${xh.mail.default-encoding}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false



mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    cn:
      xh_net:
        studio:
          mapper: debug
          service: debug
          controller: debug
    org.springframework.security: DEBUG
    org.springframework.security.web.FilterChainProxy: TRACE

xh:
  jwt:
    #设置jwt签名加密使用的密钥
    secret-key: ${xh.jwt.secret-key}
    #设置jwt过期时间
    ttl: 7200000
    #设置前端传递的令牌名称
    token-name: Authorization
  captcha:
    #设置验证码过期时间（分钟）
    ttl: 2
    #设置验证码图片宽度
    width: 200
    #设置验证码图片高度
    height: 100
  reset-password:
    #设置重置密码过期时间（分钟）
    ttl: 5
    #设置重置密码请求次数限制
    max-count: 3
    #设置重置密码请求次数限制过期时间（小时）
    count-ttl: 1
